server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed assets — immutable cache (Vite adds content hash to filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy — forward to FastAPI backend
    # SSE streams (AI classification, notifications) need buffering disabled.
    location /api/v1/ {
        proxy_pass         http://api:8000/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # SSE / streaming response support
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # Backend health check passthrough
    location /health {
        proxy_pass http://api:8000/health;
    }

    # SPA catch-all — all unknown paths serve index.html (React Router handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;
}
